<svg width="640" height="148" viewBox="0 0 640 148" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">IBKR API 集成徽章</title>
  <desc id="desc">一个可点击的徽章，说明 Alpha Forge 支持 Interactive Brokers、TWS API、IB Gateway、模拟交易和实盘执行路径。</desc>
  <defs>
    <linearGradient id="badgeBg" x1="0" y1="0" x2="640" y2="148" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F7F8FA"/>
    </linearGradient>
    <linearGradient id="markRed" x1="58" y1="36" x2="116" y2="112" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#E2231A"/>
      <stop offset="1" stop-color="#B91C1C"/>
    </linearGradient>
    <filter id="badgeShadow" x="-8%" y="-28%" width="116%" height="164%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#111827" flood-opacity="0.10"/>
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#111827" flood-opacity="0.08"/>
    </filter>
    <style>
      .label { font: 650 12px -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif; letter-spacing: 1.5px; fill: #6B7280; }
      .brand { font: 800 31px -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif; letter-spacing: -0.3px; fill: #111827; }
      .body { font: 500 15px -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif; fill: #4B5563; }
      .pillText { font: 650 13px -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif; fill: #111827; }
      .ctaText { font: 700 14px -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif; fill: #FFFFFF; }
      .markText { font: 800 23px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: -0.6px; fill: #FFFFFF; }
    </style>
  </defs>

  <rect x="12" y="12" width="616" height="124" rx="30" fill="url(#badgeBg)" stroke="#E5E7EB" filter="url(#badgeShadow)"/>
  <rect x="34" y="34" width="80" height="80" rx="24" fill="#111827"/>
  <path d="M50 92C68 77 84 62 101 46" stroke="url(#markRed)" stroke-width="11" stroke-linecap="round" opacity="0.95"/>
  <text x="50" y="83" class="markText">IBKR</text>
  <path d="M53 94H96" stroke="#FFFFFF" stroke-width="3.2" stroke-linecap="round" opacity="0.92"/>

  <text x="138" y="54" class="label">券商执行通道</text>
  <text x="138" y="88" class="brand">IBKR 就绪执行</text>
  <text x="138" y="113" class="body">TWS API / IB Gateway / 受治理的模拟到实盘路径</text>

  <rect x="430" y="36" width="164" height="34" rx="17" fill="#F3F4F6" stroke="#E5E7EB"/>
  <text x="452" y="58" class="pillText">券商支持</text>
  <rect x="430" y="80" width="164" height="36" rx="18" fill="#111827"/>
  <text x="452" y="103" class="ctaText">官方 API 页面</text>
  <path d="M570 98H582M577 93L582 98L577 103" stroke="#FFFFFF" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
