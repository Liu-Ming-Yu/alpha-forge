global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alertmanager-rules.yml

scrape_configs:
  - job_name: quant-platform-operator-api
    metrics_path: /metrics
    scheme: http
    static_configs:
      - targets:
          - 127.0.0.1:8000
        labels:
          service: quant-platform
          role: operator-api
